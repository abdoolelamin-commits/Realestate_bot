<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Real Estate Mini App</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    body {
      font-family: sans-serif;
      background: #f5f5f5;
      margin: 0;
      padding: 16px;
    }
    .card {
      background: white;
      border-radius: 14px;
      padding: 16px;
      box-shadow: 0 2px 10px rgba(0,0,0,.08);
    }
    h2 { margin-top: 0; }
    input, select, textarea, button {
      width: 100%;
      margin-top: 10px;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid #ccc;
      box-sizing: border-box;
      font-size: 15px;
    }
    button {
      background: #2481cc;
      color: white;
      border: none;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="card" id="app"></div>

  <script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    const params = new URLSearchParams(window.location.search);
    const tab = params.get("tab") || "request";

    function purposeOptions() {
      return `
        <option value="">اختر الغرض</option>
        <option value="شراء">شراء</option>
        <option value="إيجار">إيجار</option>
      `;
    }

    function propertyTypeOptions() {
      return `
        <option value="">اختر النوع</option>
        <option value="شقة">شقة</option>
        <option value="فيلا">فيلا</option>
        <option value="أرض">أرض</option>
        <option value="محل">محل</option>
      `;
    }

    function getValue(id) {
      const el = document.getElementById(id);
      return el ? el.value : "";
    }

    function renderSearch() {
      return `
        <h2>🔍 البحث عن عقار</h2>
        <select id="purpose">${purposeOptions()}</select>
        <select id="property_type">${propertyTypeOptions()}</select>
        <input id="city" placeholder="المدينة" />
        <input id="district" placeholder="الحي" />
        <input id="min_price" placeholder="أقل سعر" />
        <input id="max_price" placeholder="أعلى سعر" />
        <button onclick="submitSearch()">بحث</button>
      `;
    }

    function renderRequest() {
      return `
        <h2>📨 إرسال طلب عقاري</h2>
        <select id="purpose">${purposeOptions()}</select>
        <select id="property_type">${propertyTypeOptions()}</select>
        <input id="city" placeholder="المدينة" />
        <input id="district" placeholder="الحي" />
        <input id="min_price" placeholder="أقل سعر" />
        <input id="max_price" placeholder="أعلى سعر" />
        <textarea id="notes" placeholder="ملاحظات"></textarea>
        <button onclick="submitRequest()">إرسال الطلب</button>
      `;
    }

    function renderAdd() {
      return `
        <h2>🏠 عرض عقارك</h2>
        <select id="purpose">${purposeOptions()}</select>
        <select id="property_type">${propertyTypeOptions()}</select>
        <input id="city" placeholder="المدينة" />
        <input id="district" placeholder="الحي" />
        <input id="price" placeholder="السعر" />
        <textarea id="notes" placeholder="وصف العقار"></textarea>
        <button onclick="submitAddStart()">متابعة</button>
      `;
    }

    function submitSearch() {
      tg.sendData(JSON.stringify({
        action: "search",
        purpose: getValue("purpose"),
        property_type: getValue("property_type"),
        city: getValue("city"),
        district: getValue("district"),
        min_price: getValue("min_price"),
        max_price: getValue("max_price")
      }));
    }

    function submitRequest() {
      tg.sendData(JSON.stringify({
        action: "request",
        purpose: getValue("purpose"),
        property_type: getValue("property_type"),
        city: getValue("city"),
        district: getValue("district"),
        min_price: getValue("min_price"),
        max_price: getValue("max_price"),
        notes: getValue("notes")
      }));
    }

    function submitAddStart() {
      tg.sendData(JSON.stringify({
        action: "add_start",
        purpose: getValue("purpose"),
        property_type: getValue("property_type"),
        city: getValue("city"),
        district: getValue("district"),
        price: getValue("price"),
        notes: getValue("notes")
      }));
    }

    const app = document.getElementById("app");
    if (tab === "search") {
      app.innerHTML = renderSearch();
    } else if (tab === "add") {
      app.innerHTML = renderAdd();
    } else {
      app.innerHTML = renderRequest();
    }
  </script>
</body>
</html>
