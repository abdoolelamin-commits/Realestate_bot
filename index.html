<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Real Estate Mini App</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    body {
      font-family: Tahoma, Arial, sans-serif;
      background: #f5f7fb;
      margin: 0;
      padding: 16px;
      color: #1f2937;
    }
    .card {
      background: white;
      border-radius: 16px;
      padding: 16px;
      box-shadow: 0 4px 16px rgba(0,0,0,.08);
      max-width: 720px;
      margin: 0 auto;
    }
    h2 {
      margin: 0 0 10px;
      font-size: 22px;
    }
    p.note {
      margin: 0 0 14px;
      color: #6b7280;
      font-size: 14px;
    }
    input, select, textarea, button {
      width: 100%;
      margin-top: 10px;
      padding: 12px;
      border-radius: 12px;
      border: 1px solid #d1d5db;
      box-sizing: border-box;
      font-size: 15px;
      background: #fff;
    }
    textarea {
      min-height: 100px;
      resize: vertical;
    }
    button {
      background: #2481cc;
      color: white;
      border: none;
      cursor: pointer;
      font-weight: 700;
    }
    button:active {
      transform: scale(.99);
    }
    .hint {
      margin-top: 10px;
      font-size: 13px;
      color: #6b7280;
    }
    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    @media (max-width: 640px) {
      .row {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="card" id="app"></div>

  <script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    const params = new URLSearchParams(window.location.search);
    const tab = params.get("tab") || "request";

    function ownerPurposeOptions() {
      return `
        <option value="">اختر الغرض</option>
        <option value="بيع">بيع</option>
        <option value="إيجار">إيجار</option>
      `;
    }

    function customerPurposeOptions() {
      return `
        <option value="">اختر الغرض</option>
        <option value="شراء">شراء</option>
        <option value="إيجار">إيجار</option>
      `;
    }

    function propertyTypeOptions() {
      return `
        <option value="">اختر النوع</option>
        <option value="شقة">شقة</option>
        <option value="فيلا">فيلا</option>
        <option value="أرض">أرض</option>
        <option value="محل">محل</option>
      `;
    }

    function getValue(id) {
      const el = document.getElementById(id);
      return el ? el.value.trim() : "";
    }

    function requireFields(fields) {
      for (const field of fields) {
        if (!field.value) {
          tg.showAlert(`يرجى تعبئة الحقل: ${field.label}`);
          return false;
        }
      }
      return true;
    }

    function renderSearch() {
      return `
        <h2>🔍 البحث عن عقار</h2>
        <p class="note">املأ البيانات الأساسية وسنرسل نتائج البحث إلى البوت.</p>

        <div class="row">
          <select id="purpose">${customerPurposeOptions()}</select>
          <select id="property_type">${propertyTypeOptions()}</select>
        </div>

        <div class="row">
          <input id="city" placeholder="المدينة" />
          <input id="district" placeholder="الحي" />
        </div>

        <div class="row">
          <input id="min_price" placeholder="أقل سعر" inputmode="decimal" />
          <input id="max_price" placeholder="أعلى سعر" inputmode="decimal" />
        </div>

        <button onclick="submitSearch()">بحث</button>
      `;
    }

    function renderRequest() {
      return `
        <h2>📨 إرسال طلب عقاري</h2>
        <p class="note">هذا النموذج مخصص للعميل الباحث عن شراء أو إيجار.</p>

        <div class="row">
          <select id="purpose">${customerPurposeOptions()}</select>
          <select id="property_type">${propertyTypeOptions()}</select>
        </div>

        <div class="row">
          <input id="city" placeholder="المدينة" />
          <input id="district" placeholder="الحي" />
        </div>

        <div class="row">
          <input id="min_price" placeholder="أقل سعر" inputmode="decimal" />
          <input id="max_price" placeholder="أعلى سعر" inputmode="decimal" />
        </div>

        <textarea id="notes" placeholder="ملاحظات إضافية"></textarea>

        <button onclick="submitRequest()">إرسال الطلب</button>
      `;
    }

    function renderAdd() {
      return `
        <h2>🏠 عرض عقارك</h2>
        <p class="note">هنا الغرض الصحيح هو: بيع أو إيجار. بعد الضغط على متابعة سيطلب منك البوت الموقع ثم الصور.</p>

        <div class="row">
          <select id="purpose">${ownerPurposeOptions()}</select>
          <select id="property_type">${propertyTypeOptions()}</select>
        </div>

        <div class="row">
          <input id="city" placeholder="المدينة" />
          <input id="district" placeholder="الحي" />
        </div>

        <input id="price" placeholder="السعر" inputmode="decimal" />
        <textarea id="notes" placeholder="وصف مختصر أو ملاحظات"></textarea>

        <button onclick="submitAddStart()">متابعة</button>
        <div class="hint">بعد المتابعة سيطلب منك البوت إرسال الموقع ثم الصور داخل المحادثة.</div>
      `;
    }

    function submitSearch() {
      const payload = {
        action: "search",
        purpose: getValue("purpose"),
        property_type: getValue("property_type"),
        city: getValue("city"),
        district: getValue("district"),
        min_price: getValue("min_price"),
        max_price: getValue("max_price")
      };

     if (!requireFields([
      { value: payload.purpose, label: "الغرض" },
      { value: payload.property_type, label: "نوع العقار" }
    ])) return;

      tg.sendData(JSON.stringify(payload));
    }

    function submitRequest() {
      const payload = {
        action: "request",
        purpose: getValue("purpose"),
        property_type: getValue("property_type"),
        city: getValue("city"),
        district: getValue("district"),
        min_price: getValue("min_price"),
        max_price: getValue("max_price"),
        notes: getValue("notes")
      };

      if (!requireFields([
        { value: payload.purpose, label: "الغرض" },
        { value: payload.property_type, label: "نوع العقار" },
        { value: payload.city, label: "المدينة" },
        { value: payload.district, label: "الحي" },
        { value: payload.min_price, label: "أقل سعر" },
        { value: payload.max_price, label: "أعلى سعر" }
      ])) return;

      tg.sendData(JSON.stringify(payload));
    }

    function submitAddStart() {
      const payload = {
        action: "add_start",
        purpose: getValue("purpose"),
        property_type: getValue("property_type"),
        city: getValue("city"),
        district: getValue("district"),
        price: getValue("price"),
        notes: getValue("notes")
      };

      if (!requireFields([
        { value: payload.purpose, label: "الغرض" },
        { value: payload.property_type, label: "نوع العقار" },
        { value: payload.city, label: "المدينة" },
        { value: payload.district, label: "الحي" },
        { value: payload.price, label: "السعر" }
      ])) return;

      tg.sendData(JSON.stringify(payload));
    }

    const app = document.getElementById("app");
    if (tab === "search") {
      app.innerHTML = renderSearch();
    } else if (tab === "add") {
      app.innerHTML = renderAdd();
    } else {
      app.innerHTML = renderRequest();
    }
  </script>
</body>
</html>
